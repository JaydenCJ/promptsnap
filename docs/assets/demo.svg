<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="424" viewBox="0 0 1000 424" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="1000" height="424" rx="10" fill="#0d1117"/>
  <rect width="1000" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="500" y="21" fill="#8b949e" text-anchor="middle">promptsnap — did the refactor change what the model sees?</text>

  <text x="24" y="64" fill="#7ee787">$ promptsnap snap prompts/</text>
  <text x="24" y="86" fill="#c9d1d9" xml:space="preserve"><tspan fill="#28c840">✓</tspan> prompts/triage.prompt · free-question <tspan fill="#8b949e">→ prompts/__promptsnaps__/triage.free-question.snap.json</tspan></text>
  <text x="24" y="106" fill="#c9d1d9" xml:space="preserve"><tspan fill="#28c840">✓</tspan> prompts/triage.prompt · vip-outage <tspan fill="#8b949e">→ prompts/__promptsnaps__/triage.vip-outage.snap.json</tspan></text>
  <text x="24" y="126" fill="#28c840" xml:space="preserve">2 written, 0 unchanged · 2 pairs</text>

  <text x="24" y="158" fill="#8b949e"># …someone deletes the "redundant" VIP block while tidying the template…</text>

  <text x="24" y="190" fill="#7ee787">$ promptsnap check prompts/</text>
  <text x="24" y="212" fill="#c9d1d9" xml:space="preserve"><tspan fill="#28c840">✓</tspan> prompts/triage.prompt · free-question</text>
  <text x="24" y="232" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">✗</tspan> prompts/triage.prompt · vip-outage</text>
  <text x="24" y="252" fill="#d29922" xml:space="preserve">  message[0] system — content changed</text>
  <text x="24" y="272" fill="#56d4dd" xml:space="preserve">    @@ -2,3 +2,2 @@</text>
  <text x="24" y="292" fill="#c9d1d9" xml:space="preserve">     Route every ticket to exactly one queue: billing, outage, how-to.</text>
  <text x="24" y="312" fill="#c9d1d9" xml:space="preserve">     Reply with the queue name on the first line and a one-sentence reason on the second.</text>
  <text x="24" y="332" fill="#f85149" xml:space="preserve">    -This customer is on the ENTERPRISE plan. When a ticket is ambiguous, prefer the queue with the fastest human response.</text>
  <text x="24" y="352" fill="#8b949e" xml:space="preserve">  1 changed of 4 messages</text>
  <text x="24" y="376" fill="#f85149" xml:space="preserve">1 matched, 1 mismatched · 2 pairs</text>
  <text x="24" y="400" fill="#8b949e" xml:space="preserve">exit 1 — the VIP escalation rule silently vanished; caught in the PR, no API key, no model call</text>
</svg>
